name: Apply operational Supabase migration

# Controlled execution requested after SUPABASE_ACCESS_TOKEN provisioning on 2026-07-22 at 09:22 Chile.
on:
  push:
    branches: [feature/platform-redesign-operational-core]
    paths:
      - .github/workflows/apply-operational-migration.yml
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  migrate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_PROJECT_REF: kxrxlygnhukfmdgqhoaz
      SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
    steps:
      - name: Check required credentials
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            gh pr comment 10 --repo ageyssel/sercoprev-web --body \
              '⚠️ La migración operativa no se ejecutó porque `SUPABASE_ACCESS_TOKEN` no está disponible como GitHub Actions repository secret. No publique su valor en el PR ni en el chat.'
            exit 1
          fi
          if [ -z "${SUPABASE_SECRET_KEY:-}" ]; then
            gh pr comment 10 --repo ageyssel/sercoprev-web --body \
              '⚠️ La migración no se pudo verificar porque falta `SUPABASE_SECRET_KEY`.'
            exit 1
          fi
          echo 'Supabase management and runtime credentials are available. Values remain masked.'

      - name: Checkout feature branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/platform-redesign-operational-core

      - name: Apply migrations using Supabase Management API
        shell: bash
        run: |
          set +e
          python <<'PY' > /tmp/supabase-migration.log 2>&1
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          endpoint = f"https://api.supabase.com/v1/projects/{os.environ['SUPABASE_PROJECT_REF']}/database/query"
          token = os.environ['SUPABASE_ACCESS_TOKEN']
          migration_paths = [
              Path('supabase/migrations/202607220001_operational_platform.sql'),
              Path('supabase/migrations/202607220002_operational_trigger_fix.sql'),
              Path('supabase/migrations/202607220003_billing_support.sql'),
          ]

          for path in migration_paths:
              print(f'Applying {path.name}...', flush=True)
              body = json.dumps({'query': path.read_text(), 'read_only': False}).encode()
              request = urllib.request.Request(
                  endpoint,
                  data=body,
                  method='POST',
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Content-Type': 'application/json',
                      'User-Agent': 'sercoprev-github-actions',
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=180) as response:
                      response_body = response.read().decode('utf-8', errors='replace')
                      if response.status not in (200, 201):
                          raise RuntimeError(f'{path.name}: unexpected HTTP {response.status}: {response_body[:1200]}')
              except urllib.error.HTTPError as error:
                  details = error.read().decode('utf-8', errors='replace')[:1600]
                  raise RuntimeError(f'{path.name}: Supabase returned HTTP {error.code}: {details}') from error
              except urllib.error.URLError as error:
                  raise RuntimeError(f'{path.name}: network error: {error.reason}') from error
              print(f'Applied {path.name}', flush=True)
          PY
          status=$?
          set -e
          cat /tmp/supabase-migration.log
          if [ "$status" -ne 0 ]; then
            safe_log=$(tail -n 25 /tmp/supabase-migration.log | sed 's/`/'"'"'/g' | head -c 5000)
            gh pr comment 10 --repo ageyssel/sercoprev-web --body "❌ La migración de Supabase falló dentro de la Management API. Diagnóstico sanitizado:\n\n\`\`\`text\n${safe_log}\n\`\`\`"
            exit "$status"
          fi

      - name: Verify operational schema with service credential
        shell: bash
        run: |
          set -euo pipefail
          failed=''
          for resource in \
            'empresas?select=id,estado_cliente,contador_asignado,plan_servicio&limit=1' \
            'leads?select=id&limit=1' \
            'obligaciones?select=id&limit=1' \
            'tareas?select=id&limit=1' \
            'solicitudes_documentos?select=id&limit=1' \
            'servicios_contratados?select=id&limit=1' \
            'auditoria_eventos?select=id&limit=1' \
            'honorarios?select=id&limit=1' \
            'tickets?select=id&limit=1' \
            'ticket_mensajes?select=id&limit=1' \
            'contactos_empresa?select=id&limit=1'; do
            table="${resource%%\?*}"
            status=$(curl --silent --show-error --output /tmp/supabase-check.json --write-out '%{http_code}' \
              "${SUPABASE_URL}/rest/v1/${resource}" \
              -H "apikey: ${SUPABASE_SECRET_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SECRET_KEY}")
            if [ "$status" != '200' ]; then
              failed="${failed} ${table}(HTTP ${status})"
            fi
          done
          if [ -n "$failed" ]; then
            gh pr comment 10 --repo ageyssel/sercoprev-web --body "❌ Las consultas SQL finalizaron, pero la verificación REST detectó recursos no disponibles:${failed}."
            exit 1
          fi

      - name: Report success
        run: |
          gh pr comment 10 --repo ageyssel/sercoprev-web --body \
            '✅ Migraciones operativas aplicadas y verificadas en Supabase. Se confirmaron clientes ampliados, leads, obligaciones, tareas, solicitudes, servicios, auditoría, honorarios, consultas y contactos empresariales.'
