name: MFA Production Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose-auth-key:
    if: github.head_ref == 'ops/mfa-production-diagnostic'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - name: Test modern secret key against Auth Admin
        shell: bash
        run: |
          set -euo pipefail
          rest_headers=(-H "apikey: $SUPABASE_SECRET_KEY" -H "Authorization: Bearer $SUPABASE_SECRET_KEY" -H 'Accept: application/json')
          profile_status=$(curl -sS --max-time 30 "${rest_headers[@]}" -o /tmp/profile.json -w '%{http_code}' "$SUPABASE_URL/rest/v1/empresas?select=user_id&es_admin=eq.true&limit=1" || true)
          admin_user_id=$(jq -r 'if type == "array" and length > 0 then .[0].user_id // empty else empty end' /tmp/profile.json)
          echo "profile_status=$profile_status profile_found=$([ -n "$admin_user_id" ] && echo true || echo false)"
          test -n "$admin_user_id"

          apikey_only_status=$(curl -sS --max-time 30 \
            -H "apikey: $SUPABASE_SECRET_KEY" \
            -H 'Accept: application/json' \
            -o /tmp/apikey-only.json \
            -w '%{http_code}' \
            "$SUPABASE_URL/auth/v1/admin/users/$admin_user_id" || true)
          apikey_only_error=$(jq -c 'if (.message or .msg or .error_description or .error) then {message:(.message // .msg // .error_description // .error)} else null end' /tmp/apikey-only.json 2>/dev/null || echo null)
          apikey_only_user=$(jq -r 'if (.id // .user.id) then true else false end' /tmp/apikey-only.json 2>/dev/null || echo false)
          echo "apikey_only status=$apikey_only_status user=$apikey_only_user error=$apikey_only_error"

          bearer_status=$(curl -sS --max-time 30 \
            -H "apikey: $SUPABASE_SECRET_KEY" \
            -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
            -H 'Accept: application/json' \
            -o /tmp/bearer.json \
            -w '%{http_code}' \
            "$SUPABASE_URL/auth/v1/admin/users/$admin_user_id" || true)
          bearer_error=$(jq -c 'if (.message or .msg or .error_description or .error) then {message:(.message // .msg // .error_description // .error)} else null end' /tmp/bearer.json 2>/dev/null || echo null)
          bearer_user=$(jq -r 'if (.id // .user.id) then true else false end' /tmp/bearer.json 2>/dev/null || echo false)
          echo "apikey_and_bearer status=$bearer_status user=$bearer_user error=$bearer_error"
