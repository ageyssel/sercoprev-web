name: MFA Production Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'ops/mfa-production-diagnostic'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Read SERCOPREV production endpoints
        shell: bash
        run: |
          set -euo pipefail
          home_status=$(curl -sSL --max-time 30 -o /tmp/home.html -w '%{http_code}' 'https://www.sercoprev.cl/' || true)
          login_status=$(curl -sSL --max-time 30 -o /tmp/login.html -w '%{http_code}' 'https://www.sercoprev.cl/login' || true)
          verify_status=$(curl -sS --max-time 30 -D /tmp/verify.headers -o /tmp/verify.html -w '%{http_code}' 'https://www.sercoprev.cl/login/verificar-codigo' || true)
          health_status=$(curl -sSL --max-time 30 -o /tmp/health.json -w '%{http_code}' 'https://www.sercoprev.cl/api/health' || true)
          version_status=$(curl -sSL --max-time 30 -o /tmp/version.json -w '%{http_code}' 'https://www.sercoprev.cl/api/version' || true)
          echo "home=$home_status login=$login_status verify=$verify_status health=$health_status version=$version_status"
          echo 'HEALTH_BODY_BEGIN'
          cat /tmp/health.json || true
          echo
          echo 'HEALTH_BODY_END'
          echo 'VERSION_BODY_BEGIN'
          cat /tmp/version.json || true
          echo
          echo 'VERSION_BODY_END'
          echo 'VERIFY_HEADERS_BEGIN'
          cat /tmp/verify.headers || true
          echo 'VERIFY_HEADERS_END'

  diagnose-supabase:
    if: github.head_ref == 'ops/mfa-production-diagnostic'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Inspect credential classes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, json, os

          def classify(name):
              value = os.environ.get(name, '').strip()
              result = {'name': name, 'configured': bool(value), 'kind': 'missing'}
              if not value:
                  print(json.dumps(result))
                  return
              if value.startswith('sb_secret_'):
                  result['kind'] = 'opaque_secret'
              elif value.count('.') == 2:
                  result['kind'] = 'jwt'
                  try:
                      segment = value.split('.')[0]
                      segment += '=' * (-len(segment) % 4)
                      header = json.loads(base64.urlsafe_b64decode(segment).decode())
                      result['alg'] = header.get('alg')
                      result['has_kid'] = bool(header.get('kid'))
                  except Exception:
                      result['header_parse'] = 'failed'
              else:
                  result['kind'] = 'other'
              print(json.dumps(result))

          classify('SUPABASE_SECRET_KEY')
          classify('SUPABASE_SERVICE_ROLE_KEY')
          PY

      - name: Inspect Supabase dependencies without personal data
        shell: bash
        run: |
          set -euo pipefail
          headers=(-H "apikey: $SUPABASE_SECRET_KEY" -H "Authorization: Bearer $SUPABASE_SECRET_KEY" -H 'Accept: application/json')

          check_rest() {
            local name="$1"
            local path="$2"
            local body="/tmp/${name}.json"
            local status
            status=$(curl -sS --max-time 30 "${headers[@]}" -o "$body" -w '%{http_code}' "$SUPABASE_URL/rest/v1/$path" || true)
            local error
            error=$(jq -c 'if type == "object" and (.message or .code) then {code:(.code // null),message:(.message // null),details:(.details // null),hint:(.hint // null)} else null end' "$body" 2>/dev/null || echo null)
            echo "$name status=$status error=$error"
          }

          check_rest admin_profile 'empresas?select=user_id&es_admin=eq.true&limit=1'
          check_rest lotes_documentales 'lotes_documentales?select=id,estado&limit=1'
          check_rest archivos_ingesta 'archivos_ingesta?select=id,estado,confianza&limit=1'
          check_rest documentos 'documentos?select=id,lote_id,clasificacion_estado,fuente_carga&limit=1'
          check_rest staff_mfa_challenges 'staff_mfa_challenges?select=id&limit=1'
          check_rest staff_mfa_sessions 'staff_mfa_sessions?select=id&limit=1'

          admin_user_id=$(jq -r 'if type == "array" and length > 0 then .[0].user_id // empty else empty end' /tmp/admin_profile.json)
          if [ -n "$admin_user_id" ]; then
            auth_status=$(curl -sS --max-time 30 "${headers[@]}" -o /tmp/auth-user.json -w '%{http_code}' "$SUPABASE_URL/auth/v1/admin/users/$admin_user_id" || true)
            auth_error=$(jq -c 'if (.message or .msg or .error_description) then {message:(.message // .msg // .error_description)} else null end' /tmp/auth-user.json 2>/dev/null || echo null)
            echo "administrator_auth_lookup status=$auth_status error=$auth_error"

            if [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
              legacy_headers=(-H "apikey: $SUPABASE_SERVICE_ROLE_KEY" -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" -H 'Accept: application/json')
              legacy_status=$(curl -sS --max-time 30 "${legacy_headers[@]}" -o /tmp/auth-user-legacy.json -w '%{http_code}' "$SUPABASE_URL/auth/v1/admin/users/$admin_user_id" || true)
              legacy_error=$(jq -c 'if (.message or .msg or .error_description) then {message:(.message // .msg // .error_description)} else null end' /tmp/auth-user-legacy.json 2>/dev/null || echo null)
              echo "administrator_auth_lookup_service_role status=$legacy_status error=$legacy_error"
            fi
          else
            echo 'administrator_auth_lookup status=none error={"message":"NO_ADMIN_PROFILE"}'
          fi

          storage_status=$(curl -sS --max-time 30 "${headers[@]}" -o /tmp/buckets.json -w '%{http_code}' "$SUPABASE_URL/storage/v1/bucket" || true)
          storage_private=$(jq -r 'if type == "array" then any(.[]; .id == "documentos" and .public == false) else false end' /tmp/buckets.json 2>/dev/null || echo false)
          storage_error=$(jq -c 'if type == "object" and (.message or .error) then {message:(.message // .error)} else null end' /tmp/buckets.json 2>/dev/null || echo null)
          echo "storage_buckets status=$storage_status documentosPrivate=$storage_private error=$storage_error"
