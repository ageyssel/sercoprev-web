name: Remove tracked generated artifacts

on:
  push:
    branches:
      - hotfix/cloudflare-free-size
    paths:
      - .github/workflows/remove-generated-artifacts.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: hotfix/cloudflare-free-size
          fetch-depth: 0

      - name: Remove tracked build output
        shell: bash
        run: |
          git rm -r --ignore-unmatch .open-next .next
          if git diff --cached --quiet; then
            echo "No tracked build output found"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove tracked OpenNext build artifacts"
          git push origin HEAD:hotfix/cloudflare-free-size
