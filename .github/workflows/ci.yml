name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - agent/**
      - hotfix/**
      - feature/**

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_LpXB0WEd-O8Y5ARxeEZ2hQ_xhw3jP1n
      APP_BASE_URL: https://www.sercoprev.cl
      SUPABASE_SECRET_KEY: sb_secret_ci_placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Lint
        run: npm run lint -- --quiet

      - name: Typecheck
        run: npm run typecheck

      - name: Build Cloudflare Worker
        shell: bash
        run: |
          set +e
          npm run build:cloudflare > /tmp/sercoprev-cloudflare-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Cloudflare build failed with exit code $status"
            tail -n 160 /tmp/sercoprev-cloudflare-build.log
            exit "$status"
          fi
          tail -n 40 /tmp/sercoprev-cloudflare-build.log

      - name: Enforce Cloudflare Free bundle limit
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler deploy --dry-run --outdir .wrangler-dry-run > /tmp/sercoprev-size.log 2>&1
          cat /tmp/sercoprev-size.log

          gzip_kib=$(sed -n 's/.*gzip: \([0-9.]*\) KiB.*/\1/p' /tmp/sercoprev-size.log | tail -n 1)
          if [ -z "$gzip_kib" ]; then
            echo "No se pudo determinar el tamaño comprimido del Worker."
            exit 1
          fi

          python - "$gzip_kib" <<'PY'
          import sys

          size = float(sys.argv[1])
          limit = 3000.0
          print(f"Worker comprimido: {size:.2f} KiB; máximo CI: {limit:.0f} KiB")
          if size > limit:
              raise SystemExit("El Worker supera el margen seguro del plan Free de Cloudflare")
          PY

      - name: Smoke test public routes in workerd
        shell: bash
        run: |
          set -euo pipefail

          cat > .dev.vars <<EOF
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
          APP_BASE_URL=${APP_BASE_URL}
          SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
          EOF

          npx opennextjs-cloudflare preview --port 8787 > /tmp/sercoprev-preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT

          ready=false
          for attempt in $(seq 1 60); do
            if ! kill -0 "$preview_pid" 2>/dev/null; then
              echo "Cloudflare preview stopped unexpectedly"
              tail -n 240 /tmp/sercoprev-preview.log
              exit 1
            fi

            status=$(curl --silent --show-error --output /tmp/sercoprev-home.html --write-out '%{http_code}' http://127.0.0.1:8787/ || true)
            if [ "$status" = "200" ]; then
              ready=true
              break
            fi
            sleep 1
          done

          if [ "$ready" != "true" ]; then
            echo "Cloudflare preview did not return HTTP 200 for /"
            tail -n 240 /tmp/sercoprev-preview.log
            exit 1
          fi

          grep -qi 'Contabilidad clara' /tmp/sercoprev-home.html
          grep -qi 'Solicitar evaluación' /tmp/sercoprev-home.html

          check_html_route() {
            route="$1"
            expected="$2"
            output="$3"
            status=$(curl --silent --show-error --output "$output" --write-out '%{http_code}' "http://127.0.0.1:8787$route" || true)
            echo "GET $route => HTTP $status"
            if [ "$status" != "200" ]; then
              cat "$output" || true
              tail -n 300 /tmp/sercoprev-preview.log
              exit 1
            fi
            grep -qi "$expected" "$output"
          }

          check_html_route '/login' 'Ingrese a su portal' /tmp/sercoprev-login.html
          check_html_route '/privacidad' 'Política de privacidad' /tmp/sercoprev-privacy.html
          check_html_route '/terminos' 'Términos de uso' /tmp/sercoprev-terms.html

          sitemap_status=$(curl --silent --show-error --output /tmp/sercoprev-sitemap.xml --write-out '%{http_code}' http://127.0.0.1:8787/sitemap.xml || true)
          echo "GET /sitemap.xml => HTTP $sitemap_status"
          test "$sitemap_status" = "200"
          grep -q 'https://www.sercoprev.cl/' /tmp/sercoprev-sitemap.xml

          health_status=$(curl --silent --show-error --output /tmp/sercoprev-health.json --write-out '%{http_code}' http://127.0.0.1:8787/api/health || true)
          echo "GET /api/health => HTTP $health_status"
          cat /tmp/sercoprev-health.json
          if [ "$health_status" != "200" ] && [ "$health_status" != "503" ]; then
            tail -n 300 /tmp/sercoprev-preview.log
            exit 1
          fi
          grep -Eq '"status":"(ok|degraded)"' /tmp/sercoprev-health.json
