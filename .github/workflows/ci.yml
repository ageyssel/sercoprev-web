name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - agent/**

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_LpXB0WEd-O8Y5ARxeEZ2hQ_xhw3jP1n
      APP_BASE_URL: https://www.sercoprev.cl
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Lint
        run: npm run lint -- --quiet

      - name: Typecheck
        run: npm run typecheck

      - name: Build Cloudflare Worker
        shell: bash
        run: |
          set +e
          npm run build:cloudflare > /tmp/sercoprev-cloudflare-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Cloudflare build failed with exit code $status"
            tail -n 160 /tmp/sercoprev-cloudflare-build.log
            exit "$status"
          fi
          tail -n 40 /tmp/sercoprev-cloudflare-build.log

      - name: Smoke test in workerd
        shell: bash
        run: |
          set -euo pipefail
          npx opennextjs-cloudflare preview --port 8787 > /tmp/sercoprev-preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 60); do
            if ! kill -0 "$preview_pid" 2>/dev/null; then
              echo "Cloudflare preview stopped unexpectedly"
              tail -n 160 /tmp/sercoprev-preview.log
              exit 1
            fi

            status=$(curl --silent --show-error --output /tmp/sercoprev-home.html --write-out '%{http_code}' http://127.0.0.1:8787/ || true)
            if [ "$status" = "200" ]; then
              grep -qi 'SERCOPREV' /tmp/sercoprev-home.html
              exit 0
            fi

            sleep 1
          done

          echo "Cloudflare preview did not return HTTP 200"
          tail -n 160 /tmp/sercoprev-preview.log
          exit 1
