name: Sync lockfile

on:
  push:
    branches:
      - agent/supabase-security-hardening
    paths:
      - package.json

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/supabase-security-hardening
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit lockfile when changed
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already synchronized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Synchronize package lock"
          git push origin HEAD:agent/supabase-security-hardening
