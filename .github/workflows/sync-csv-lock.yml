name: Sync CSV hotfix lockfile

on:
  push:
    branches:
      - hotfix/cloudflare-free-size
    paths:
      - package.json
      - .github/workflows/sync-csv-lock.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: hotfix/cloudflare-free-size
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Synchronize package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit package lock
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already synchronized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Synchronize CSV hotfix lockfile"
          git push origin HEAD:hotfix/cloudflare-free-size
