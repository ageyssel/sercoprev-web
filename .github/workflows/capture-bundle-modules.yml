name: Capture Worker bundle modules

on:
  push:
    branches:
      - hotfix/cloudflare-free-size
    paths:
      - .github/workflows/capture-bundle-modules.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_LpXB0WEd-O8Y5ARxeEZ2hQ_xhw3jP1n
      APP_BASE_URL: https://www.sercoprev.cl
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: hotfix/cloudflare-free-size
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Build and capture modules
        shell: bash
        run: |
          npm ci --no-audit --no-fund --silent
          npm run build:cloudflare > /tmp/build.log 2>&1
          npx wrangler deploy --dry-run --outdir .wrangler-dry-run > /tmp/size.log 2>&1
          mkdir -p diagnostics
          python <<'PY' > diagnostics/worker-bundle-modules.txt
          import gzip
          import json
          import re
          from pathlib import Path

          print(Path('/tmp/size.log').read_text())
          meta_path = Path('.open-next/server-functions/default/handler.mjs.meta.json')
          print(f'\nMetafile: {meta_path}\n')
          data = json.loads(meta_path.read_text())
          sizes = {}
          for output in data.get('outputs', {}).values():
              for path, details in output.get('inputs', {}).items():
                  sizes[path] = sizes.get(path, 0) + int(details.get('bytesInOutput', 0))

          ordered = sorted(sizes.items(), key=lambda item: item[1], reverse=True)
          for path, size in ordered[:80]:
              print(f'{size / 1024:10.2f} KiB  {path}')

          print('\nCHUNK INSPECTION\n')
          tokens = [
              'xlsx', '@supabase', 'supabase-js', 'postgrest', 'gotrue',
              'realtime-js', 'storage-js', 'next/dist', 'react-dom',
              'app/admin', 'DataImporter', 'createServerClient',
          ]
          inspected = 0
          for path, _ in ordered:
              chunk = Path(path)
              if not chunk.exists() or chunk.suffix not in {'.js', '.mjs'}:
                  continue
              raw = chunk.read_bytes()
              if len(raw) < 100_000:
                  continue
              inspected += 1
              text = raw.decode('utf-8', errors='ignore')
              compressed = len(gzip.compress(raw, compresslevel=9))
              print(f'\n{chunk} | raw={len(raw)/1024:.2f} KiB | gzip={compressed/1024:.2f} KiB')
              for token in tokens:
                  count = text.lower().count(token.lower())
                  if count:
                      print(f'  token {token}: {count}')
              markers = sorted(set(re.findall(r'\[project\]/([^\]"\n]+)', text)))
              relevant = [marker for marker in markers if 'node_modules' in marker or marker.startswith('app/')]
              for marker in relevant[:60]:
                  print(f'  module {marker[:220]}')
              if inspected >= 15:
                  break
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/worker-bundle-modules.txt
          git commit -m "Capture detailed Worker bundle modules"
          git push origin HEAD:hotfix/cloudflare-free-size
