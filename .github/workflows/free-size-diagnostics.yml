name: Free bundle size diagnostics

on:
  push:
    branches:
      - hotfix/cloudflare-free-size

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      NEXT_PUBLIC_SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_LpXB0WEd-O8Y5ARxeEZ2hQ_xhw3jP1n
      APP_BASE_URL: https://www.sercoprev.cl
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Measure and inspect bundle
        shell: bash
        run: |
          npm ci --no-audit --no-fund --silent
          npm run build:cloudflare > /tmp/build.log 2>&1
          npx wrangler deploy --dry-run --outdir .wrangler-dry-run > /tmp/size.log 2>&1

          python <<'PY' > /tmp/modules.log
          import gzip
          import json
          import re
          from pathlib import Path

          meta_path = Path('.open-next/server-functions/default/handler.mjs.meta.json')
          if not meta_path.exists():
              print(f'No existe {meta_path}')
              raise SystemExit(0)

          data = json.loads(meta_path.read_text())
          sizes = {}
          for output in data.get('outputs', {}).values():
              for path, details in output.get('inputs', {}).items():
                  sizes[path] = sizes.get(path, 0) + int(details.get('bytesInOutput', 0))

          ordered = sorted(sizes.items(), key=lambda item: item[1], reverse=True)
          for path, size in ordered[:40]:
              print(f'{size / 1024:10.2f} KiB  {path}')

          print('\nINSPECCIÓN DE LOS CHUNKS MAYORES\n')
          tokens = [
              'xlsx', '@supabase', 'supabase-js', 'postgrest', 'gotrue',
              'realtime-js', 'storage-js', 'next/dist', 'react-dom',
              'app/admin', 'DataImporter', 'createServerClient',
          ]

          for path, _ in ordered:
              chunk = Path(path)
              if not chunk.exists() or chunk.suffix not in {'.js', '.mjs'}:
                  continue
              raw = chunk.read_bytes()
              if len(raw) < 100_000:
                  continue
              text = raw.decode('utf-8', errors='ignore')
              compressed = len(gzip.compress(raw, compresslevel=9))
              print(f'\n{chunk} | raw={len(raw)/1024:.2f} KiB | gzip={compressed/1024:.2f} KiB')
              found = False
              for token in tokens:
                  count = text.lower().count(token.lower())
                  if count:
                      found = True
                      print(f'  {token}: {count}')
              module_markers = sorted(set(re.findall(r'\[project\]/([^\]"\n]+)', text)))
              relevant = [marker for marker in module_markers if 'node_modules' in marker or marker.startswith('app/')]
              for marker in relevant[:30]:
                  print(f'  module: {marker[:180]}')
              if not found and not relevant:
                  print('  sin marcadores reconocibles')
              if sum(1 for p, _ in ordered if Path(p).exists() and Path(p).suffix in {'.js', '.mjs'} and Path(p).stat().st_size >= 100_000 and p <= path) >= 12:
                  pass
          PY

          {
            echo '<!-- sercoprev-free-size -->'
            echo '### Tamaño y composición del Worker'
            echo
            echo '```text'
            cat /tmp/size.log
            echo
            echo 'Módulos con mayor aporte al handler:'
            cat /tmp/modules.log
            echo '```'
          } > /tmp/comment.md

          gh api repos/ageyssel/sercoprev-web/issues/comments/5039888555 \
            --method PATCH \
            --raw-field body="$(cat /tmp/comment.md)"
