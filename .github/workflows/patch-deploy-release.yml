name: Align Release Markers

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'hotfix/official-source-parsers'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: hotfix/official-source-parsers
          fetch-depth: 0

      - name: Align application release markers and push
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          old = '2026-07-23-official-sync-operational-1'
          new = '2026-07-23-closed-record-integrity-1'
          for filename in ('app/api/health/route.ts', 'app/api/version/route.ts'):
              path = Path(filename)
              text = path.read_text()
              if old in text:
                  path.write_text(text.replace(old, new))
          PY
          if git diff --quiet; then exit 0; fi
          git config user.name 'SERCOPREV Automation'
          git config user.email 'actions@users.noreply.github.com'
          git add app/api/health/route.ts app/api/version/route.ts
          git commit -m 'Mantener marcador compatible con despliegue productivo'
          git push origin HEAD:hotfix/official-source-parsers
