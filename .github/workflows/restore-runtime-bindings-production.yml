name: Restore Runtime Bindings Production

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy-and-verify:
    if: github.head_ref == 'ops/restore-runtime-bindings-production'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 9021b712f9a73815e6b333a4870e0021
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
      WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
    steps:
      - name: Validate credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${SUPABASE_SECRET_KEY:-}"
          test -n "${RESEND_API_KEY:-}"

      - name: Checkout latest main
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Build Cloudflare Worker
        run: npm run build:cloudflare

      - name: Prepare atomic secrets
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, secrets
          from pathlib import Path

          values = {
              'SUPABASE_SECRET_KEY': os.environ['SUPABASE_SECRET_KEY'],
              'RESEND_API_KEY': os.environ['RESEND_API_KEY'],
              'OFFICIAL_SYNC_TOKEN': secrets.token_urlsafe(48),
          }
          for name in ('WHATSAPP_ACCESS_TOKEN', 'WHATSAPP_PHONE_NUMBER_ID'):
              value = os.environ.get(name, '').strip()
              if value:
                  values[name] = value

          path = Path('/tmp/sercoprev-secrets.json')
          path.write_text(json.dumps(values))
          path.chmod(0o600)
          PY

      - name: Deploy Worker with declared vars and secrets
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f /tmp/sercoprev-secrets.json' EXIT
          npx wrangler deploy --secrets-file /tmp/sercoprev-secrets.json

      - name: Verify active bindings
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/sercoprev-web/settings"
          curl -sS --max-time 30 -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$api" -o /tmp/settings.json
          jq -e '.success == true' /tmp/settings.json >/dev/null
          for name in \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            APP_BASE_URL \
            RESEND_FROM_EMAIL \
            NOTIFICATION_ADMIN_EMAILS \
            WHATSAPP_API_BASE_URL \
            WHATSAPP_TEMPLATE_LANGUAGE \
            WHATSAPP_DOCUMENT_REQUEST_TEMPLATE \
            SUPABASE_SECRET_KEY \
            RESEND_API_KEY \
            OFFICIAL_SYNC_TOKEN \
            ASSETS \
            WORKER_SELF_REFERENCE; do
            jq -e --arg name "$name" '.result.bindings | any(.name == $name)' /tmp/settings.json >/dev/null || {
              echo "Missing Worker binding: $name"
              jq '[.result.bindings[] | {name, type}]' /tmp/settings.json
              exit 1
            }
          done
          jq '[.result.bindings[] | {name, type}]' /tmp/settings.json

      - name: Verify production contract
        shell: bash
        run: |
          set -euo pipefail
          healthy=false
          for attempt in $(seq 1 60); do
            home_status=$(curl -sSL --max-time 20 -o /tmp/home.html -w '%{http_code}' https://www.sercoprev.cl/ || true)
            login_status=$(curl -sSL --max-time 20 -o /tmp/login.html -w '%{http_code}' https://www.sercoprev.cl/login || true)
            verify_status=$(curl -sS --max-time 20 -o /tmp/verify.html -w '%{http_code}' https://www.sercoprev.cl/login/verificar-codigo || true)
            health_status=$(curl -sS --max-time 20 -o /tmp/health.json -w '%{http_code}' https://www.sercoprev.cl/api/health || true)
            version_status=$(curl -sS --max-time 20 -o /tmp/version.json -w '%{http_code}' https://www.sercoprev.cl/api/version || true)

            if [ "$home_status" = 200 ] \
              && [ "$login_status" = 200 ] \
              && { [ "$verify_status" = 302 ] || [ "$verify_status" = 307 ] || [ "$verify_status" = 308 ]; } \
              && [ "$health_status" = 200 ] \
              && [ "$version_status" = 200 ] \
              && grep -q '"status":"ok"' /tmp/health.json \
              && grep -q '"publicSupabaseConfig":true' /tmp/health.json \
              && grep -q '"database":true' /tmp/health.json \
              && grep -q '"operationalSchema":true' /tmp/health.json \
              && grep -q '"payrollSchema":true' /tmp/health.json \
              && grep -q '"accountingSchema":true' /tmp/health.json \
              && grep -q '"officialDataHistorySchema":true' /tmp/health.json \
              && grep -q '"staffMfaSchema":true' /tmp/health.json \
              && grep -q '"staffMfaEmailDeliveryConfigured":true' /tmp/health.json \
              && grep -q '"administrator":true' /tmp/health.json \
              && grep -q '"documentStorage":true' /tmp/health.json \
              && grep -q '"release":"2026-07-23-staff-email-mfa-health-2"' /tmp/version.json; then
              healthy=true
              break
            fi
            sleep 5
          done

          echo "home=${home_status:-unknown} login=${login_status:-unknown} verify=${verify_status:-unknown} health=${health_status:-unknown} version=${version_status:-unknown}"
          cat /tmp/health.json 2>/dev/null || true
          echo
          cat /tmp/version.json 2>/dev/null || true
          echo
          test "$healthy" = true
