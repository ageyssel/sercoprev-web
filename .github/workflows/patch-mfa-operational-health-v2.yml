name: Patch MFA Operational Health V2

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'hotfix/mfa-operational-health-v2'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: hotfix/mfa-operational-health-v2
          fetch-depth: 0

      - name: Align deployment release
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/deploy-cloudflare.yml')
          text = path.read_text()
          path.write_text(text.replace('2026-07-23-staff-email-mfa-health-1', '2026-07-23-staff-email-mfa-health-2'))
          PY

          if git diff --quiet; then
            echo 'Deployment release already aligned.'
            exit 0
          fi
          git config user.name 'SERCOPREV Automation'
          git config user.email 'actions@users.noreply.github.com'
          git add .github/workflows/deploy-cloudflare.yml
          git commit -m 'Alinear release productivo MFA v2'
          git pull --rebase origin hotfix/mfa-operational-health-v2
          git push origin HEAD:hotfix/mfa-operational-health-v2
