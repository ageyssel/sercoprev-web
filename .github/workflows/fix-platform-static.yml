name: Fix platform static issues

on:
  push:
    branches: [feature/platform-redesign-operational-core]
    paths:
      - .github/workflows/fix-platform-static.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/platform-redesign-operational-core
          fetch-depth: 0

      - name: Replace impure render date
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          page = Path('app/admin/page.tsx')
          text = page.read_text()
          old = "  const today = new Date().toISOString().slice(0, 10)\n  const inThirtyDays = new Date(Date.now() + 30 * 86_400_000).toISOString().slice(0, 10)"
          new = "  const todayDate = new Date()\n  const today = todayDate.toISOString().slice(0, 10)\n  const inThirtyDaysDate = new Date(todayDate)\n  inThirtyDaysDate.setUTCDate(inThirtyDaysDate.getUTCDate() + 30)\n  const inThirtyDays = inThirtyDaysDate.toISOString().slice(0, 10)"
          if old not in text:
              raise SystemExit('Expected dashboard date calculation was not found')
          page.write_text(text.replace(old, new, 1))
          PY

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/admin/page.tsx
          git commit -m "Make dashboard date calculation deterministic"
          git push origin HEAD:feature/platform-redesign-operational-core
