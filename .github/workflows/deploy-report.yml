name: Report Deployment

on:
  workflow_run:
    workflows: ["Deploy Cloudflare"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-24.04
    steps:
      - name: Comment deployment result
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$CONCLUSION" = 'success' ]; then
            summary='Despliegue Cloudflare completado correctamente.'
          else
            summary='Despliegue Cloudflare finalizado con error; producción permanece en la última versión verificada.'
          fi
          body=$(printf '%s\n\n- Resultado: `%s`\n- Commit: `%s`\n- Run: %s\n' "$summary" "$CONCLUSION" "$HEAD_SHA" "$RUN_URL")
          gh issue comment 13 --repo "$REPOSITORY" --body "$body"
