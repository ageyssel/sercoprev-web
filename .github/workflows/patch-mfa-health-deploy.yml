name: Patch MFA Health Deploy

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'hotfix/staff-mfa-health-stable-deploy'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: hotfix/staff-mfa-health-stable-deploy
          fetch-depth: 0

      - name: Align production verification
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/deploy-cloudflare.yml')
          text = path.read_text()
          old_release = '2026-07-23-staff-email-mfa-1'
          new_release = '2026-07-23-staff-email-mfa-health-1'
          text = text.replace(old_release, new_release)

          old_verify = "verify_status=$(curl -sSL --max-time 20 -o /tmp/verify.html -w '%{http_code}' 'https://www.sercoprev.cl/login/verificar-codigo' || true)"
          new_verify = "verify_status=$(curl -sS --max-time 20 -o /tmp/verify.html -w '%{http_code}' 'https://www.sercoprev.cl/login/verificar-codigo' || true)"
          if old_verify in text:
              text = text.replace(old_verify, new_verify, 1)
          elif new_verify not in text:
              raise SystemExit('Verification request anchor not found')

          email_check = "              && grep -q '\"staffMfaEmailDeliveryConfigured\":true' /tmp/health.json \\\n"
          schema_check = "              && grep -q '\"staffMfaSchema\":true' /tmp/health.json \\\n"
          if email_check not in text:
              if schema_check not in text:
                  raise SystemExit('MFA health anchor not found')
              text = text.replace(schema_check, schema_check + email_check, 1)

          path.write_text(text)
          PY

          if git diff --quiet; then
            echo 'Deployment contract already aligned.'
            exit 0
          fi
          git config user.name 'SERCOPREV Automation'
          git config user.email 'actions@users.noreply.github.com'
          git add .github/workflows/deploy-cloudflare.yml
          git commit -m 'Alinear certificación productiva del MFA'
          git push origin HEAD:hotfix/staff-mfa-health-stable-deploy
