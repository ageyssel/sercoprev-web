name: Patch Staff MFA Deploy

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/staff-email-mfa-24h'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/staff-email-mfa-24h
          fetch-depth: 0

      - name: Patch deploy contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          deploy = Path('.github/workflows/deploy-cloudflare.yml')
          text = deploy.read_text()
          anchor = '            supabase/migrations/202607230014_closed_record_integrity.sql\n'
          migration = '            supabase/migrations/202607230015_staff_email_mfa.sql\n'
          if migration not in text:
              if anchor not in text:
                  raise SystemExit('Migration anchor not found')
              text = text.replace(anchor, anchor + migration, 1)

          old_release = '2026-07-23-closed-record-integrity-1'
          new_release = '2026-07-23-staff-email-mfa-1'
          if old_release not in text and new_release not in text:
              raise SystemExit('Release marker not found')
          text = text.replace(old_release, new_release)
          deploy.write_text(text)
          PY

          if git diff --quiet; then
            echo 'Deploy contract already aligned.'
            exit 0
          fi
          git config user.name 'SERCOPREV Automation'
          git config user.email 'actions@users.noreply.github.com'
          git add .github/workflows/deploy-cloudflare.yml
          git commit -m 'Integrar migración y release del MFA interno'
          git push origin HEAD:feature/staff-email-mfa-24h
