name: Platform diagnostics

on:
  push:
    branches: [feature/platform-redesign-operational-core]
    paths:
      - .github/workflows/platform-diagnostics.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_LpXB0WEd-O8Y5ARxeEZ2hQ_xhw3jP1n
      APP_BASE_URL: https://www.sercoprev.cl
      SUPABASE_SECRET_KEY: sb_secret_ci_placeholder
    steps:
      - name: Checkout branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: feature/platform-redesign-operational-core
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Capture diagnostics
        shell: bash
        run: |
          npm ci --no-audit --no-fund --silent
          mkdir -p diagnostics
          set +e
          npm run lint -- --quiet > /tmp/lint.log 2>&1
          lint_status=$?
          npm run typecheck > /tmp/typecheck.log 2>&1
          type_status=$?
          set -e
          {
            echo "LINT_STATUS=$lint_status"
            cat /tmp/lint.log
            echo
            echo "TYPECHECK_STATUS=$type_status"
            cat /tmp/typecheck.log
          } > diagnostics/platform-ci.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/platform-ci.log
          git commit -m "Capture platform CI diagnostics"
          git push origin HEAD:feature/platform-redesign-operational-core
