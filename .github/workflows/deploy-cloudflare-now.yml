name: Check Supabase privileged secret now

on:
  push:
    branches: [ops/verify-production-now]
    paths:
      - .github/workflows/deploy-cloudflare-now.yml

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Report private credential availability only
        shell: bash
        run: |
          secret_key=false
          service_role=false
          [ -n "${SUPABASE_SECRET_KEY:-}" ] && secret_key=true
          [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && service_role=true

          gh issue comment 6 --repo ageyssel/sercoprev-web --body \
            "### Disponibilidad de credencial privada en GitHub

- \`SUPABASE_SECRET_KEY\`: $secret_key
- \`SUPABASE_SERVICE_ROLE_KEY\`: $service_role

Solo se comprobó la existencia de cada secreto. Ningún valor fue leído, impreso ni transferido."
