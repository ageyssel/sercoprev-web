name: Diagnose Supabase secret installation

on:
  push:
    branches: [ops/verify-production-now]
    paths:
      - .github/workflows/deploy-cloudflare-now.yml

permissions:
  contents: read
  issues: write

jobs:
  diagnose-secret:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 9021b712f9a73815e6b333a4870e0021
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - name: Confirm credential availability
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${SUPABASE_SECRET_KEY:-}"
          gh issue comment 6 --repo ageyssel/sercoprev-web --body \
            '⏳ Diagnóstico aislado de `wrangler secret put` iniciado. Ambos secretos están disponibles y permanecen ocultos.'

      - name: Checkout production branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Install secret with bounded diagnostic
        id: secret
        shell: bash
        run: |
          set +e
          printf '%s\n' "$SUPABASE_SECRET_KEY" | timeout 120 npx wrangler secret put SUPABASE_SECRET_KEY --name sercoprev-web > /tmp/wrangler-secret.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"

          if [ "$status" -eq 0 ]; then
            message='✅ Wrangler instaló `SUPABASE_SECRET_KEY` correctamente en el Worker.'
          elif [ "$status" -eq 124 ]; then
            message='❌ Wrangler agotó el límite de 120 segundos al instalar el secreto.'
          elif grep -qi 'permission\|authorized\|authentication' /tmp/wrangler-secret.log; then
            message='❌ Cloudflare rechazó la operación por permisos o autenticación insuficiente del API token.'
          elif grep -qi 'not found\|could not find' /tmp/wrangler-secret.log; then
            message='❌ Wrangler no encontró el Worker `sercoprev-web` en la cuenta configurada.'
          else
            message="❌ Wrangler no pudo instalar el secreto. Código de salida: $status."
          fi

          gh issue comment 6 --repo ageyssel/sercoprev-web --body "$message"
          exit "$status"

      - name: Verify health after secret installation
        shell: bash
        run: |
          set -euo pipefail
          health_status='000'
          for attempt in $(seq 1 20); do
            health_status=$(curl --silent --show-error --location --max-time 20 \
              --output /tmp/health.json --write-out '%{http_code}' \
              'https://www.sercoprev.cl/api/health' || true)
            if [ "$health_status" = '200' ] || [ "$health_status" = '503' ]; then
              break
            fi
            sleep 5
          done

          {
            echo '### Verificación posterior a la instalación del secreto'
            echo
            echo "- health: HTTP $health_status"
            echo
            echo '```json'
            cat /tmp/health.json 2>/dev/null || echo '{"status":"unavailable"}'
            echo
            echo '```'
          } > /tmp/health-result.md

          gh issue comment 6 --repo ageyssel/sercoprev-web --body-file /tmp/health-result.md
