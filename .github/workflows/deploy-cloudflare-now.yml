name: Install Supabase secret and verify production

on:
  push:
    branches: [ops/verify-production-now]
    paths:
      - .github/workflows/deploy-cloudflare-now.yml

permissions:
  contents: read
  issues: write

jobs:
  install-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 9021b712f9a73815e6b333a4870e0021
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_LpXB0WEd-O8Y5ARxeEZ2hQ_xhw3jP1n
      APP_BASE_URL: https://www.sercoprev.cl
    steps:
      - name: Confirm credentials without exposing values
        shell: bash
        run: |
          set -euo pipefail
          cloudflare=false
          supabase=false
          [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && cloudflare=true
          [ -n "${SUPABASE_SECRET_KEY:-}" ] && supabase=true

          gh issue comment 6 --repo ageyssel/sercoprev-web --body \
            "⏳ Instalación del secreto Supabase iniciada. Cloudflare token: $cloudflare. Supabase secret: $supabase. Ningún valor fue mostrado."

          test "$cloudflare" = true
          test "$supabase" = true

      - name: Checkout production branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Install Supabase secret in Cloudflare
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$SUPABASE_SECRET_KEY" | npx wrangler secret put SUPABASE_SECRET_KEY --name sercoprev-web
          gh issue comment 6 --repo ageyssel/sercoprev-web --body \
            '✅ `SUPABASE_SECRET_KEY` fue instalada en Cloudflare como secreto runtime. El valor permaneció oculto.'

      - name: Build Cloudflare Worker
        run: npm run build:cloudflare

      - name: Deploy while preserving runtime secrets
        run: npx opennextjs-cloudflare deploy -- --keep-vars

      - name: Verify production and Supabase
        shell: bash
        run: |
          set -euo pipefail
          healthy=false

          for attempt in $(seq 1 30); do
            home_status=$(curl --silent --show-error --location --max-time 20 \
              --output /tmp/home.html --write-out '%{http_code}' \
              'https://www.sercoprev.cl/' || true)
            login_status=$(curl --silent --show-error --location --max-time 20 \
              --output /tmp/login.html --write-out '%{http_code}' \
              'https://www.sercoprev.cl/login' || true)
            health_status=$(curl --silent --show-error --location --max-time 20 \
              --output /tmp/health.json --write-out '%{http_code}' \
              'https://www.sercoprev.cl/api/health' || true)

            if [ "$home_status" = '200' ] \
              && [ "$login_status" = '200' ] \
              && [ "$health_status" = '200' ] \
              && grep -qi 'SERCOPREV' /tmp/home.html \
              && grep -qi 'Acceso Portal' /tmp/login.html \
              && grep -q '"status":"ok"' /tmp/health.json; then
              healthy=true
              break
            fi

            sleep 10
          done

          {
            if [ "$healthy" = true ]; then
              echo '## ✅ Supabase y producción completamente operativos'
            else
              echo '## ⚠️ Secreto instalado; quedan controles Supabase pendientes'
            fi
            echo
            echo "- portada: HTTP $home_status"
            echo "- login: HTTP $login_status"
            echo "- health: HTTP $health_status"
            echo
            echo '### Respuesta segura de health'
            echo '```json'
            cat /tmp/health.json 2>/dev/null || echo '{"status":"unavailable"}'
            echo
            echo '```'
            echo
            echo "Commit desplegado: $(git rev-parse HEAD)"
          } > /tmp/result.md

          gh issue comment 6 --repo ageyssel/sercoprev-web --body-file /tmp/result.md

          test "$healthy" = true
