name: Inspect Wrangler version commands

on:
  push:
    branches: [ops/verify-production-now]
    paths:
      - .github/workflows/deploy-cloudflare-now.yml

permissions:
  contents: read
  issues: write

jobs:
  inspect:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout production branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Capture command help
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler versions secret put --help > /tmp/secret-help.txt 2>&1
          npx wrangler versions deploy --help > /tmp/deploy-help.txt 2>&1

          {
            echo '## Sintaxis Wrangler instalada en el proyecto'
            echo
            echo '### `versions secret put`'
            echo '```text'
            sed -n '1,160p' /tmp/secret-help.txt
            echo '```'
            echo
            echo '### `versions deploy`'
            echo '```text'
            sed -n '1,180p' /tmp/deploy-help.txt
            echo '```'
          } > /tmp/help.md

          gh issue comment 6 --repo ageyssel/sercoprev-web --body-file /tmp/help.md
