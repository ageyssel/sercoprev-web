name: Deploy Cloudflare now

# Re-run after provisioning CLOUDFLARE_API_TOKEN.
on:
  push:
    branches: [ops/verify-production-now]
    paths:
      - .github/workflows/deploy-cloudflare-now.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 9021b712f9a73815e6b333a4870e0021
      NEXT_PUBLIC_SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_LpXB0WEd-O8Y5ARxeEZ2hQ_xhw3jP1n
      APP_BASE_URL: https://www.sercoprev.cl
    steps:
      - name: Report start
        run: |
          gh pr comment 4 --repo ageyssel/sercoprev-web --body \
            '⏳ Despliegue directo con Wrangler iniciado desde el último commit de `main`.'

      - name: Verify Cloudflare credential availability
        shell: bash
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            gh pr comment 4 --repo ageyssel/sercoprev-web --body \
              '❌ El repositorio no tiene disponible el secreto `CLOUDFLARE_API_TOKEN`; no fue posible realizar el despliegue directo.'
            exit 1
          fi

      - name: Checkout production branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Build Cloudflare Worker
        run: npm run build:cloudflare

      - name: Deploy without replacing runtime variables
        run: npx opennextjs-cloudflare deploy -- --keep-vars

      - name: Verify deployed production
        shell: bash
        run: |
          set -euo pipefail
          healthy=false
          for attempt in $(seq 1 30); do
            home_status=$(curl --silent --show-error --location --max-time 20 \
              --output /tmp/home.html --write-out '%{http_code}' \
              'https://www.sercoprev.cl/' || true)
            login_status=$(curl --silent --show-error --location --max-time 20 \
              --output /tmp/login.html --write-out '%{http_code}' \
              'https://www.sercoprev.cl/login' || true)
            health_status=$(curl --silent --show-error --location --max-time 20 \
              --output /tmp/health.json --write-out '%{http_code}' \
              'https://www.sercoprev.cl/api/health' || true)

            if [ "$home_status" = '200' ] \
              && [ "$login_status" = '200' ] \
              && [ "$health_status" = '200' ] \
              && grep -qi 'SERCOPREV' /tmp/home.html \
              && grep -qi 'Acceso Portal' /tmp/login.html \
              && grep -q '"status":"ok"' /tmp/health.json; then
              healthy=true
              break
            fi
            sleep 10
          done

          {
            if [ "$healthy" = 'true' ]; then
              echo '## ✅ Despliegue directo y verificación completados'
            else
              echo '## ⚠️ El Worker se desplegó, pero la verificación funcional no quedó completamente sana'
            fi
            echo
            echo "- portada www: HTTP $home_status"
            echo "- login www: HTTP $login_status"
            echo "- health www: HTTP $health_status"
            echo
            echo '```json'
            cat /tmp/health.json 2>/dev/null || echo '{"status":"unavailable"}'
            echo
            echo '```'
            echo
            echo "Commit desplegado: $(git rev-parse HEAD)"
          } > /tmp/deploy-result.md

          gh pr comment 4 --repo ageyssel/sercoprev-web --body-file /tmp/deploy-result.md

          test "$healthy" = 'true'
