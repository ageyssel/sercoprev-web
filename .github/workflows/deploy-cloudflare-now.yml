name: Deploy Worker atomically with Supabase secret

on:
  push:
    branches: [ops/verify-production-now]
    paths:
      - .github/workflows/deploy-cloudflare-now.yml

permissions:
  contents: read
  issues: write

jobs:
  deploy-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 9021b712f9a73815e6b333a4870e0021
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_LpXB0WEd-O8Y5ARxeEZ2hQ_xhw3jP1n
      APP_BASE_URL: https://www.sercoprev.cl
    steps:
      - name: Confirm credentials without exposing values
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${SUPABASE_SECRET_KEY:-}"
          gh issue comment 6 --repo ageyssel/sercoprev-web --body \
            '⏳ Despliegue atómico iniciado: código de `main` y `SUPABASE_SECRET_KEY` se cargarán en la misma versión. Ningún valor será registrado.'

      - name: Checkout production branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Build Cloudflare Worker
        run: npm run build:cloudflare

      - name: Prepare temporary secrets file
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('/tmp/sercoprev-cloudflare-secrets.json')
          path.write_text(json.dumps({
              'SUPABASE_SECRET_KEY': os.environ['SUPABASE_SECRET_KEY'],
          }))
          path.chmod(0o600)
          PY

      - name: Deploy code and secret as one version
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f /tmp/sercoprev-cloudflare-secrets.json' EXIT
          npx opennextjs-cloudflare deploy -- \
            --keep-vars \
            --secrets-file /tmp/sercoprev-cloudflare-secrets.json
          gh issue comment 6 --repo ageyssel/sercoprev-web --body \
            '✅ OpenNext y Wrangler desplegaron el código y la clave Supabase en una única versión productiva.'

      - name: Verify production and Supabase
        shell: bash
        run: |
          set -euo pipefail
          healthy=false
          health_status='000'

          for attempt in $(seq 1 40); do
            health_status=$(curl --silent --show-error --location --max-time 20 \
              --output /tmp/health.json --write-out '%{http_code}' \
              'https://www.sercoprev.cl/api/health' || true)

            if [ "$health_status" = '200' ] && grep -q '"status":"ok"' /tmp/health.json; then
              healthy=true
              break
            fi

            sleep 5
          done

          home_status=$(curl --silent --show-error --location --max-time 20 \
            --output /tmp/home.html --write-out '%{http_code}' \
            'https://www.sercoprev.cl/' || true)
          login_status=$(curl --silent --show-error --location --max-time 20 \
            --output /tmp/login.html --write-out '%{http_code}' \
            'https://www.sercoprev.cl/login' || true)

          {
            if [ "$healthy" = true ]; then
              echo '## ✅ Supabase y producción completamente operativos'
            else
              echo '## ⚠️ Despliegue completado; quedan componentes Supabase pendientes'
            fi
            echo
            echo "- portada: HTTP $home_status"
            echo "- login: HTTP $login_status"
            echo "- health: HTTP $health_status"
            echo
            echo '### Respuesta segura de health'
            echo '```json'
            cat /tmp/health.json 2>/dev/null || echo '{"status":"unavailable"}'
            echo
            echo '```'
            echo
            echo "Commit desplegado: $(git rev-parse HEAD)"
          } > /tmp/result.md

          gh issue comment 6 --repo ageyssel/sercoprev-web --body-file /tmp/result.md

          test "$home_status" = '200'
          test "$login_status" = '200'
