name: Diagnose Server Error 3257248274

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'ops/error-3257248274-diagnostic'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 9021b712f9a73815e6b333a4870e0021
    steps:
      - name: Query recent Worker errors
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/error-diagnostic
          export QUERY_NOW=$(date +%s000)
          export QUERY_FROM=$((QUERY_NOW - 6*60*60*1000))
          endpoint="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/observability/telemetry/query"

          python - <<'PY'
          import json, os
          from pathlib import Path

          base = {
              "timeframe": {"from": int(os.environ["QUERY_FROM"]), "to": int(os.environ["QUERY_NOW"])},
              "view": "events",
              "limit": 500,
          }
          errors = {
              **base,
              "queryId": "sercoprev-errors-3257248274",
              "parameters": {
                  "datasets": [],
                  "filterCombination": "and",
                  "filters": [
                      {"key": "$metadata.service", "operation": "eq", "type": "string", "value": "sercoprev-web"},
                      {"key": "$metadata.error", "operation": "exists", "type": "string"},
                  ],
                  "limit": 500,
              },
          }
          digest = {
              **base,
              "queryId": "sercoprev-digest-3257248274",
              "parameters": {
                  "datasets": [],
                  "filterCombination": "and",
                  "filters": [
                      {"key": "$metadata.service", "operation": "eq", "type": "string", "value": "sercoprev-web"},
                  ],
                  "needle": {"value": "3257248274", "isRegex": False, "matchCase": True},
                  "limit": 500,
              },
          }
          out = Path('/tmp/error-diagnostic')
          (out / 'errors-query.json').write_text(json.dumps(errors))
          (out / 'digest-query.json').write_text(json.dumps(digest))
          PY

          for query in errors digest; do
            status=$(curl -sS --max-time 60 -o "/tmp/error-diagnostic/${query}-response.json" -w '%{http_code}' \
              -X POST "$endpoint" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H 'Content-Type: application/json' \
              --data-binary "@/tmp/error-diagnostic/${query}-query.json" || true)
            echo "${query}_status=${status}" | tee -a /tmp/error-diagnostic/statuses.txt
            jq '.' "/tmp/error-diagnostic/${query}-response.json" > "/tmp/error-diagnostic/${query}-pretty.json" 2>/dev/null || cp "/tmp/error-diagnostic/${query}-response.json" "/tmp/error-diagnostic/${query}-pretty.json"
          done

          curl -sS --max-time 30 -D /tmp/error-diagnostic/health.headers -o /tmp/error-diagnostic/health.json https://www.sercoprev.cl/api/health || true
          curl -sS --max-time 30 -D /tmp/error-diagnostic/version.headers -o /tmp/error-diagnostic/version.json https://www.sercoprev.cl/api/version || true

          echo '=== ERROR QUERY ==='
          cat /tmp/error-diagnostic/errors-pretty.json
          echo '=== DIGEST QUERY ==='
          cat /tmp/error-diagnostic/digest-pretty.json
          echo '=== HEALTH ==='
          cat /tmp/error-diagnostic/health.json
          echo
          echo '=== VERSION ==='
          cat /tmp/error-diagnostic/version.json
          echo

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-error-3257248274
          path: /tmp/error-diagnostic
          retention-days: 3
