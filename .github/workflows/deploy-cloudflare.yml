name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 9021b712f9a73815e6b333a4870e0021
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_DB_URL_SECRET: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_DATABASE_URL_SECRET: ${{ secrets.SUPABASE_DATABASE_URL }}
      DATABASE_URL_SECRET: ${{ secrets.DATABASE_URL }}
      POSTGRES_URL_SECRET: ${{ secrets.POSTGRES_URL }}
      SUPABASE_DB_PASSWORD_SECRET: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DATABASE_PASSWORD_SECRET: ${{ secrets.SUPABASE_DATABASE_PASSWORD }}
      POSTGRES_PASSWORD_SECRET: ${{ secrets.POSTGRES_PASSWORD }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
      WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
      NEXT_PUBLIC_SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_LpXB0WEd-O8Y5ARxeEZ2hQ_xhw3jP1n
      APP_BASE_URL: https://www.sercoprev.cl
      RESEND_FROM_EMAIL: SERCOPREV <portal@sercoprev.cl>
      NOTIFICATION_ADMIN_EMAILS: ${{ vars.NOTIFICATION_ADMIN_EMAILS || 'contabilidad@sercoprev.cl' }}
      WHATSAPP_API_BASE_URL: ${{ vars.WHATSAPP_API_BASE_URL || 'https://graph.facebook.com/v23.0' }}
      WHATSAPP_TEMPLATE_LANGUAGE: ${{ vars.WHATSAPP_TEMPLATE_LANGUAGE || 'es_CL' }}
      WHATSAPP_DOCUMENT_REQUEST_TEMPLATE: ${{ vars.WHATSAPP_DOCUMENT_REQUEST_TEMPLATE || 'sercoprev_solicitud_documental' }}

    steps:
      - name: Validate deployment credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo '::error title=Missing Cloudflare credential::Add CLOUDFLARE_API_TOKEN.'; exit 1; }
          test -n "${SUPABASE_SECRET_KEY:-}" || { echo '::error title=Missing Supabase credential::Add SUPABASE_SECRET_KEY.'; exit 1; }
          if [ -z "${SUPABASE_DB_URL_SECRET:-}${SUPABASE_DATABASE_URL_SECRET:-}${DATABASE_URL_SECRET:-}${POSTGRES_URL_SECRET:-}${SUPABASE_DB_PASSWORD_SECRET:-}${SUPABASE_DATABASE_PASSWORD_SECRET:-}${POSTGRES_PASSWORD_SECRET:-}" ]; then
            echo '::error title=Missing Supabase database connection::Add a PostgreSQL URI or database password secret.'
            exit 1
          fi
          [ -n "${RESEND_API_KEY:-}" ] || echo '::warning title=Email notifications disabled::RESEND_API_KEY is not configured.'
          if [ -z "${WHATSAPP_ACCESS_TOKEN:-}" ] || [ -z "${WHATSAPP_PHONE_NUMBER_ID:-}" ]; then
            echo '::warning title=WhatsApp notifications disabled::WhatsApp remains optional and does not block deployment.'
          fi

      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends postgresql-client
          fi
          psql --version

      - name: Resolve Supabase database connection
        shell: bash
        run: |
          set -euo pipefail
          raw=''
          for value in "${SUPABASE_DB_URL_SECRET:-}" "${SUPABASE_DATABASE_URL_SECRET:-}" "${DATABASE_URL_SECRET:-}" "${POSTGRES_URL_SECRET:-}"; do
            if [ -n "$value" ]; then raw="$value"; break; fi
          done
          raw=$(RAW="$raw" python - <<'PY'
          import os
          value = os.environ.get('RAW', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1].strip()
          print(value, end='')
          PY
          )

          password=''
          for value in "${SUPABASE_DB_PASSWORD_SECRET:-}" "${SUPABASE_DATABASE_PASSWORD_SECRET:-}" "${POSTGRES_PASSWORD_SECRET:-}"; do
            if [ -n "$value" ]; then password="$value"; break; fi
          done

          if [[ "$raw" == postgresql://* || "$raw" == postgres://* ]]; then
            echo "::add-mask::$raw"
            if psql "$raw" -v ON_ERROR_STOP=1 -Atqc 'select 1' >/dev/null 2>&1; then
              echo "SUPABASE_DB_URL=$raw" >> "$GITHUB_ENV"
              exit 0
            fi
            extracted=$(RAW="$raw" python - <<'PY'
          import os
          from urllib.parse import unquote, urlparse
          value = unquote(urlparse(os.environ['RAW']).password or '')
          print('' if value.upper() in {'YOUR-PASSWORD', '[YOUR-PASSWORD]', 'PASSWORD', '[PASSWORD]'} else value, end='')
          PY
            )
            [ -z "$password" ] && password="$extracted"
          elif [ -n "$raw" ] && [ -z "$password" ]; then
            password="$raw"
          fi

          test -n "$password" || { echo '::error title=Invalid Supabase connection::No usable database password was found.'; exit 1; }
          echo "::add-mask::$password"
          encoded=$(PASSWORD="$password" python - <<'PY'
          import os
          from urllib.parse import quote
          print(quote(os.environ['PASSWORD'], safe=''), end='')
          PY
          )

          project_ref='kxrxlygnhukfmdgqhoaz'
          regions=(sa-east-1 us-east-1 us-east-2 us-west-1 us-west-2 ca-central-1 eu-west-1 eu-west-2 eu-central-1 ap-south-1 ap-southeast-1 ap-southeast-2 ap-northeast-1 ap-northeast-2)
          for region in "${regions[@]}"; do
            for cluster in 0 1 2; do
              for port in 5432 6543; do
                candidate="postgresql://postgres.${project_ref}:${encoded}@aws-${cluster}-${region}.pooler.supabase.com:${port}/postgres?sslmode=require&connect_timeout=6"
                echo "::add-mask::$candidate"
                if psql "$candidate" -v ON_ERROR_STOP=1 -Atqc 'select 1' >/dev/null 2>&1; then
                  echo "SUPABASE_DB_URL=$candidate" >> "$GITHUB_ENV"
                  echo "Supabase pooler resolved for ${region}:${port}."
                  exit 0
                fi
              done
            done
          done
          echo '::error title=Supabase connection failed::No compatible Session Pooler accepted the configured credential.'
          exit 1

      - name: Apply pending Supabase migrations
        shell: bash
        run: |
          set -euo pipefail
          migrations=(
            supabase/migrations/202607220004_recurring_tasks_notifications.sql
            supabase/migrations/202607230005_accounting_payroll_users_documents.sql
            supabase/migrations/202607230006_document_intake_queue.sql
            supabase/migrations/202607230007_user_security_and_payroll_defaults.sql
            supabase/migrations/202607230008_payroll_monthly_inputs.sql
            supabase/migrations/202607230009_client_payroll_visibility.sql
            supabase/migrations/202607230010_accounting_imports.sql
            supabase/migrations/202607230011_official_indicators_and_parameter_trace.sql
            supabase/migrations/202607230012_automatic_official_data.sql
            supabase/migrations/202607230013_immutable_payroll_and_indicator_history.sql
          )
          for migration in "${migrations[@]}"; do test -f "$migration"; done

          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 <<'SQL'
          create table if not exists public.sercoprev_schema_migrations (
            filename text primary key,
            checksum text not null,
            applied_at timestamptz not null default now()
          );
          revoke all on table public.sercoprev_schema_migrations from anon, authenticated;
          SQL

          for migration in "${migrations[@]}"; do
            filename=$(basename "$migration")
            checksum=$(sha256sum "$migration" | awk '{print $1}')
            recorded=$(psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -Atqc "select checksum from public.sercoprev_schema_migrations where filename = '$filename'")
            if [ -n "$recorded" ]; then
              test "$recorded" = "$checksum" || { echo "::error title=Migration checksum changed::$filename differs from the applied migration."; exit 1; }
              echo "Skipping already applied migration: $filename"
              continue
            fi
            echo "Applying migration: $filename"
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$migration"
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -c "insert into public.sercoprev_schema_migrations(filename, checksum) values ('$filename', '$checksum')"
          done

          missing_tables=$(psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -Atqc "
            select count(*) from (values
              (to_regclass('public.tarea_series')),
              (to_regclass('public.notificaciones')),
              (to_regclass('public.trabajadores')),
              (to_regclass('public.novedades_remuneraciones')),
              (to_regclass('public.plan_cuentas')),
              (to_regclass('public.importaciones_contables')),
              (to_regclass('public.archivos_ingesta')),
              (to_regclass('public.usuarios_organizacion')),
              (to_regclass('public.empresa_usuarios')),
              (to_regclass('public.indicadores_oficiales')),
              (to_regclass('public.datos_oficiales')),
              (to_regclass('public.datos_oficiales_versiones'))
            ) as required(table_name) where table_name is null;")
          test "$missing_tables" = '0'

          missing_columns=$(psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -Atqc "
            select count(*) from (values
              ('uf_fecha'),
              ('utm_periodo'),
              ('fuente_uf'),
              ('fuente_utm'),
              ('indicadores_verificados_at'),
              ('fuentes_automaticas'),
              ('parametros_automaticos_at')
            ) as required(column_name)
            where not exists (
              select 1 from information_schema.columns
              where table_schema = 'public' and table_name = 'parametros_remuneraciones' and columns.column_name = required.column_name
            );")
          test "$missing_columns" = '0'

          missing_triggers=$(psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -Atqc "
            select count(*) from (values
              ('datos_oficiales_capture_version'),
              ('parametros_remuneraciones_lock_referenced'),
              ('periodos_remuneraciones_protect_state'),
              ('movimientos_remuneracion_protect_closed_period'),
              ('novedades_remuneraciones_protect_closed_period'),
              ('liquidaciones_protect_closed_period'),
              ('liquidacion_detalles_protect_closed_period')
            ) as required(trigger_name)
            where not exists (
              select 1 from pg_trigger where not tgisinternal and tgname = required.trigger_name
            );")
          test "$missing_triggers" = '0'
          echo 'Supabase migrations, official history and payroll immutability protections verified.'

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Build Cloudflare Worker
        run: npm run build:cloudflare

      - name: Confirm Free plan bundle size
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler deploy --dry-run --outdir .wrangler-dry-run > /tmp/worker-size.log 2>&1
          cat /tmp/worker-size.log
          gzip_kib=$(sed -n 's/.*gzip: \([0-9.]*\) KiB.*/\1/p' /tmp/worker-size.log | tail -n 1)
          python - "$gzip_kib" <<'PY'
          import sys
          size = float(sys.argv[1])
          if size > 3000:
              raise SystemExit(f'Worker too large for Free plan: {size:.2f} KiB')
          print(f'Worker size accepted: {size:.2f} KiB gzip')
          PY

      - name: Prepare temporary secrets file
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, secrets
          from pathlib import Path
          values = {
              'SUPABASE_SECRET_KEY': os.environ['SUPABASE_SECRET_KEY'],
              'OFFICIAL_SYNC_TOKEN': secrets.token_urlsafe(48),
          }
          for name in ('RESEND_API_KEY', 'WHATSAPP_ACCESS_TOKEN', 'WHATSAPP_PHONE_NUMBER_ID'):
              value = os.environ.get(name, '').strip()
              if value:
                  values[name] = value
          path = Path('/tmp/sercoprev-cloudflare-secrets.json')
          path.write_text(json.dumps(values))
          path.chmod(0o600)
          PY

      - name: Deploy code and secrets atomically
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f /tmp/sercoprev-cloudflare-secrets.json' EXIT
          npx opennextjs-cloudflare deploy -- --keep-vars --secrets-file /tmp/sercoprev-cloudflare-secrets.json

      - name: Verify production
        shell: bash
        run: |
          set -euo pipefail
          healthy=false
          for attempt in $(seq 1 40); do
            home_status=$(curl -sSL --max-time 20 -o /tmp/home.html -w '%{http_code}' 'https://www.sercoprev.cl/' || true)
            login_status=$(curl -sSL --max-time 20 -o /tmp/login.html -w '%{http_code}' 'https://www.sercoprev.cl/login' || true)
            health_status=$(curl -sSL --max-time 20 -o /tmp/health.json -w '%{http_code}' 'https://www.sercoprev.cl/api/health' || true)
            if [ "$home_status" = '200' ] \
              && [ "$login_status" = '200' ] \
              && [ "$health_status" = '200' ] \
              && grep -qi 'SERCOPREV' /tmp/home.html \
              && grep -qi 'Ingrese a su portal' /tmp/login.html \
              && grep -q '"status":"ok"' /tmp/health.json \
              && grep -q '"operationalSchema":true' /tmp/health.json \
              && grep -q '"payrollSchema":true' /tmp/health.json \
              && grep -q '"accountingSchema":true' /tmp/health.json \
              && grep -q '"officialIndicatorsSchema":true' /tmp/health.json \
              && grep -q '"officialDataSchema":true' /tmp/health.json \
              && grep -q '"officialDataHistorySchema":true' /tmp/health.json \
              && grep -q '"userAccessSchema":true' /tmp/health.json \
              && grep -q '"documentIntakeSchema":true' /tmp/health.json; then
              healthy=true
              break
            fi
            sleep 5
          done
          echo "GET / => ${home_status:-unknown}"
          echo "GET /login => ${login_status:-unknown}"
          echo "GET /api/health => ${health_status:-unknown}"
          cat /tmp/health.json 2>/dev/null || true
          test "$healthy" = 'true'
