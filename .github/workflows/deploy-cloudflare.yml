name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 9021b712f9a73815e6b333a4870e0021
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: https://kxrxlygnhukfmdgqhoaz.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_LpXB0WEd-O8Y5ARxeEZ2hQ_xhw3jP1n
      APP_BASE_URL: https://www.sercoprev.cl
    steps:
      - name: Validate deployment credentials
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo '::error title=Missing Cloudflare credential::Add CLOUDFLARE_API_TOKEN as a repository Actions secret.'
            exit 1
          fi

          if [ -z "${SUPABASE_SECRET_KEY:-}" ]; then
            echo '::error title=Missing Supabase credential::Add SUPABASE_SECRET_KEY as a repository Actions secret.'
            exit 1
          fi

          echo 'Required deployment credentials are available. Their values remain masked.'

      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Build Cloudflare Worker
        run: npm run build:cloudflare

      - name: Confirm Free plan bundle size
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler deploy --dry-run --outdir .wrangler-dry-run > /tmp/worker-size.log 2>&1
          cat /tmp/worker-size.log
          gzip_kib=$(sed -n 's/.*gzip: \([0-9.]*\) KiB.*/\1/p' /tmp/worker-size.log | tail -n 1)
          python - "$gzip_kib" <<'PY'
          import sys

          size = float(sys.argv[1])
          if size > 3000:
              raise SystemExit(f'Worker too large for Free plan: {size:.2f} KiB')
          print(f'Worker size accepted: {size:.2f} KiB gzip')
          PY

      - name: Prepare temporary secrets file
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('/tmp/sercoprev-cloudflare-secrets.json')
          path.write_text(json.dumps({
              'SUPABASE_SECRET_KEY': os.environ['SUPABASE_SECRET_KEY'],
          }))
          path.chmod(0o600)
          PY

      - name: Deploy code and secrets atomically
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f /tmp/sercoprev-cloudflare-secrets.json' EXIT
          npx opennextjs-cloudflare deploy -- \
            --keep-vars \
            --secrets-file /tmp/sercoprev-cloudflare-secrets.json

      - name: Verify production
        shell: bash
        run: |
          set -euo pipefail
          healthy=false

          for attempt in $(seq 1 40); do
            home_status=$(curl --silent --show-error --location --max-time 20 \
              --output /tmp/home.html --write-out '%{http_code}' \
              'https://www.sercoprev.cl/' || true)
            login_status=$(curl --silent --show-error --location --max-time 20 \
              --output /tmp/login.html --write-out '%{http_code}' \
              'https://www.sercoprev.cl/login' || true)
            health_status=$(curl --silent --show-error --location --max-time 20 \
              --output /tmp/health.json --write-out '%{http_code}' \
              'https://www.sercoprev.cl/api/health' || true)

            if [ "$home_status" = '200' ] \
              && [ "$login_status" = '200' ] \
              && [ "$health_status" = '200' ] \
              && grep -qi 'SERCOPREV' /tmp/home.html \
              && grep -qi 'Acceso Portal' /tmp/login.html \
              && grep -q '"status":"ok"' /tmp/health.json; then
              healthy=true
              break
            fi

            sleep 5
          done

          cat /tmp/health.json 2>/dev/null || true
          test "$healthy" = 'true'
